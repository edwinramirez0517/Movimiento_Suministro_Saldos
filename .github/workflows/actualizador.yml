name: Actualizar Dashboard Ejecutivo

on:
  push:
    paths:
      - '**.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Ejecutar motor de compilación
        run: python compilador.py

      - name: Guardar y publicar cambios
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add Dashboard_Gerencial_Final_Compadre_V44.html
          git commit -m "Actualización automática de datos CSV" || exit 0
          git push
